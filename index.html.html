<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест на интернет-зависимость</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #5f9cff, #8f5cff);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* декоративные круги */
body::before, body::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}

body::before {
  width: 400px;
  height: 400px;
  top: -100px;
  left: -100px;
}

body::after {
  width: 300px;
  height: 300px;
  bottom: -100px;
  right: -100px;
}

.container {
  background: white;
  width: 90%;
  max-width: 650px;
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  position: relative;
  z-index: 2;
  animation: fadeIn 0.6s ease;
}

h1 { color: #333; }
h2 { color: #222; }

p {
  color: #555;
  line-height: 1.7;
  margin: 10px 0;
}

.icon {
  font-size: 50px;
  margin-bottom: 10px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.start-btn {
  background: linear-gradient(135deg, #6c63ff, #5a54e6);
  color: white;
}

.yes {
  background: linear-gradient(135deg, #43e97b, #2ecc71);
  color: white;
}

.no {
  background: linear-gradient(135deg, #ff6b6b, #e74c3c);
  color: white;
}

.progress-bar {
  height: 12px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6c63ff, #00c6ff);
  transition: 0.4s;
}

.fade {
  animation: fade 0.4s;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(15px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.95);}
  to {opacity: 1; transform: scale(1);}
}
</style>
</head>

<body>

<div class="container" id="app">
  <div class="icon">📱</div>
  <h1>Тест на интернет-зависимость</h1>
  <p>Ответь на 50 вопросов и узнай, насколько интернет влияет на твою жизнь</p>
  <button class="start-btn" onclick="startQuiz()">Начать тест</button>
</div>

<script>

const questions = [
"Ты проводишь в интернете более 3 часов в день?",
"Ты проверяешь телефон сразу после пробуждения?",
"Ты сидишь в интернете перед сном?",
"Ты теряешь счет времени онлайн?",
"Ты заходишь в интернет без конкретной цели?",
"Ты часто листаешь соцсети просто от скуки?",
"Ты отвлекаешься на телефон во время учебы или работы?",
"Ты проверяешь уведомления каждые 10–15 минут?",
"Ты чувствуешь тревогу без телефона?",
"Ты берешь телефон даже без причины?",
"Ты используешь интернет, чтобы уйти от проблем?",
"Ты откладываешь дела ради интернета?",
"Ты проводишь больше времени онлайн, чем планировал?",
"Ты сидишь в интернете ночью?",
"Ты предпочитаешь интернет живому общению?",
"Ты проверяешь соцсети более 5 раз в день?",
"Ты чувствуешь раздражение без интернета?",
"Ты часто смотришь видео подряд без остановки?",
"Ты используешь интернет во время еды?",
"Ты просыпаешься ночью, чтобы проверить телефон?",
"Ты берешь телефон в туалет?",
"Ты чувствуешь зависимость от лайков или комментариев?",
"Ты часто обновляешь ленту без причины?",
"Ты чувствуешь скуку без интернета?",
"Ты используешь интернет даже при усталости?",
"Ты заходишь в интернет первым делом после школы/работы?",
"Ты откладываешь сон ради интернета?",
"Ты проверяешь телефон во время разговора?",
"Ты используешь интернет больше, чем планировал вчера?",
"Ты часто зависаешь в коротких видео?",
"Ты не можешь долго не пользоваться интернетом?",
"Ты чувствуешь облегчение, когда снова онлайн?",
"Ты используешь интернет в транспорте постоянно?",
"Ты проверяешь телефон даже при коротком ожидании?",
"Ты используешь интернет как главное развлечение?",
"Ты чувствуешь, что проводишь слишком много времени онлайн?",
"Ты пытался сократить время, но не получилось?",
"Ты используешь интернет при любой свободной минуте?",
"Ты проверяешь уведомления сразу?",
"Ты отвлекаешься на интернет при выполнении заданий?",
"Ты используешь интернет вместо отдыха?",
"Ты предпочитаешь переписку живому разговору?",
"Ты часто проверяешь одно и то же приложение?",
"Ты чувствуешь влияние интернета на продуктивность?",
"Ты проводишь выходные онлайн?",
"Ты используешь интернет больше 5 часов в день?",
"Ты не замечаешь времени в интернете?",
"Ты берешь телефон при скуке?",
"Ты хочешь быть всегда онлайн?",
"Ты считаешь, что зависим от интернета?"
];

let current = 0;
let score = 0;

function startQuiz() {
  current = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  let percent = (current / questions.length) * 100;

  document.getElementById("app").innerHTML = `
    <div class="fade">
      <div class="icon">❓</div>
      <p>Вопрос ${current + 1} из ${questions.length}</p>

      <div class="progress-bar">
        <div class="progress-fill" style="width:${percent}%"></div>
      </div>

      <h2>${questions[current]}</h2>

      <button class="yes" onclick="answer(1)">Да</button>
      <button class="no" onclick="answer(0)">Нет</button>
    </div>
  `;
}

function answer(value) {
  score += value;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let level = "";
  let text = "";

  if (score <= 15) {
    level = "Низкая зависимость";
    text = `
    Результаты теста показывают, что уровень твоей зависимости от интернета находится на низком уровне. 
    Интернет для тебя — это инструмент, а не основная часть жизни. Ты умеешь контролировать своё время 
    и не испытываешь постоянной потребности быть онлайн.

    Такой подход считается наиболее здоровым, так как позволяет сохранять баланс между виртуальной 
    и реальной жизнью. Важно продолжать придерживаться этого баланса и не допускать постепенного 
    увеличения времени в сети.

    Рекомендуется и дальше уделять внимание живому общению, физической активности и отдыху без гаджетов.
    `;
  } 
  else if (score <= 30) {
    level = "Умеренная зависимость";
    text = `
    Результаты показывают, что интернет уже занимает значительную часть твоей жизни. 
    Ты часто используешь его не только по необходимости, но и как способ провести свободное время.

    Это может привести к снижению продуктивности, ухудшению концентрации и привычке постоянно 
    отвлекаться на телефон.

    Рекомендуется начать контролировать время, проводимое в сети: установить ограничения, 
    отключить лишние уведомления и стараться реже брать телефон без причины. Также полезно 
    развивать офлайн-хобби и проводить больше времени вне интернета.
    `;
  } 
  else if (score <= 40) {
    level = "Высокая зависимость";
    text = `
    Результаты теста указывают на высокий уровень интернет-зависимости. Интернет уже оказывает 
    заметное влияние на твою повседневную жизнь.

    Возможны проблемы с концентрацией, снижением продуктивности, нарушением режима сна и 
    зависимость от социальных сетей или онлайн-контента.

    В данной ситуации важно принять меры: сократить время в интернете, установить лимиты, 
    делать регулярные перерывы и уделять больше внимания реальной жизни.

    Рекомендуется больше двигаться, общаться с людьми вживую и находить альтернативные способы 
    отдыха без использования гаджетов.
    `;
  } 
  else {
    level = "Очень высокая зависимость";
    text = `
    Результаты показывают очень высокий уровень интернет-зависимости. Интернет занимает 
    значительную часть твоей жизни и может негативно влиять на здоровье, психоэмоциональное 
    состояние и отношения с окружающими.

    Возможны такие проблемы, как постоянная усталость, нарушение сна, снижение концентрации, 
    прокрастинация и зависимость от социальных сетей.

    Важно как можно скорее начать менять свои привычки: ограничить использование интернета, 
    убрать отвлекающие приложения, установить строгий режим дня.

    Рекомендуется заняться спортом, больше времени проводить вне дома, развивать хобби 
    и, при необходимости, обратиться за помощью к специалисту.

    Помни: контроль над интернетом — это шаг к улучшению качества жизни.
    `;
  }

  document.getElementById("app").innerHTML = `
    <div class="fade">
      <div class="icon">📊</div>
      <h1>Результат</h1>
      <p><b>${score}</b> из 50</p>
      <h2>${level}</h2>
      <p>${text}</p>
      <button class="start-btn" onclick="startQuiz()">Пройти снова</button>
    </div>
  `;
}

</script>

</body>
</html>
